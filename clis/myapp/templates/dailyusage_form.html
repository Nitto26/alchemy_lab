<!DOCTYPE html>
<html>
<head>
    <title>Daily Usage Form</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2>{% if form.instance.pk %}Edit{% else %}Add{% endif %} Daily Usage</h2>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-success">Save</button>
            <a href="{% url 'dailyusage_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
