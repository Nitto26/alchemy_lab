<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Alchemy Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="{% static 'css/dashboard-modern.css' %}">
    <link rel="stylesheet" href="{% static 'css/app-modern.css' %}">
</head>
<body>
    <div class="dashboard-shell">
        <div class="heading">Alchemy Lab</div>

        <div class="navbar">
            <div class="links">
                <a href="{% url 'add_daily_usage' %}">Daily Usage</a>
                <a href="{% url 'chemical_list' %}">Chemicals</a>
                <a href="{% url 'item_list' %}">Items</a>
                <a href="{% url 'student_list' %}">Students</a>
                <a href="{% url 'fine_list' %}">Fines</a>
            </div>

            <div class="right-icons">
                <div class="hod-container">
                    <button class="hod-icon" type="button">
                        <span class="material-icons">person</span>
                    </button>
                    <div class="hod-dropdown">Storekeeper</div>
                </div>

                <form id="logoutForm" action="{% url 'logout' %}" method="POST">
                    {% csrf_token %}
                    <button type="submit" class="logout-button">
                        <span class="material-icons">exit_to_app</span>
                    </button>
                </form>
            </div>
        </div>

        <div class="section-grid">
            <div class="tiles">
                <article class="tile">
                    <p class="tile-label">Total Items</p>
                    <p class="tile-value" id="tile-total">0</p>
                    <span class="tile-chip total">Inventory</span>
                </article>
                <article class="tile">
                    <p class="tile-label">Working</p>
                    <p class="tile-value" id="tile-working">0</p>
                    <span class="tile-chip work">Healthy</span>
                </article>
                <article class="tile">
                    <p class="tile-label">Repair</p>
                    <p class="tile-value" id="tile-repair">0</p>
                    <span class="tile-chip repair">Checkup</span>
                </article>
                <article class="tile">
                    <p class="tile-label">Damaged</p>
                    <p class="tile-value" id="tile-damaged">0</p>
                    <span class="tile-chip damage">Attention</span>
                </article>
            </div>

            <div class="graph-container">
                <div class="loader-overlay" id="chart-loader">
                    <div class="loader"></div>
                    <p class="loader-text">Loading analytics...</p>
                </div>
                <canvas id="sampleChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('/api/lab-item-status/');
                if (!response.ok) {
                    throw new Error('Network error: ' + response.statusText);
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error fetching data:', error);
                return null;
            }
        }

        function sumValues(values) {
            return values.reduce((acc, value) => acc + Number(value || 0), 0);
        }

        function updateTiles(chartData) {
            const working = sumValues(chartData.working || []);
            const repair = sumValues(chartData.repair || []);
            const damaged = sumValues(chartData.damaged || []);
            const total = working + repair + damaged;

            document.getElementById('tile-total').textContent = total;
            document.getElementById('tile-working').textContent = working;
            document.getElementById('tile-repair').textContent = repair;
            document.getElementById('tile-damaged').textContent = damaged;
        }

        async function initializeChart() {
            const loader = document.getElementById('chart-loader');
            const chartData = await fetchData();

            if (!chartData) {
                console.error('No data available to render the chart.');
                loader.classList.add('hidden');
                return;
            }

            updateTiles(chartData);

            const ctx = document.getElementById('sampleChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartData.labels,
                    datasets: [
                        {
                            label: 'Working',
                            data: chartData.working,
                            backgroundColor: '#39d98a',
                            borderRadius: 8,
                        },
                        {
                            label: 'Repair',
                            data: chartData.repair,
                            backgroundColor: '#ffd166',
                            borderRadius: 8,
                        },
                        {
                            label: 'Damaged',
                            data: chartData.damaged,
                            backgroundColor: '#ff6b7f',
                            borderRadius: 8,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.2)'
                            },
                            title: {
                                display: true,
                                text: 'Count',
                                color: '#f4f7ff'
                            },
                            ticks: {
                                color: '#f4f7ff'
                            }
                        },
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.12)'
                            },
                            title: {
                                display: true,
                                text: 'Categories',
                                color: '#f4f7ff'
                            },
                            ticks: {
                                color: '#f4f7ff'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                color: '#f4f7ff'
                            }
                        }
                    }
                }
            });

            loader.classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', initializeChart);
    </script>

</body>
</html>
