<!DOCTYPE html>
<html>
<head>
    <title>Confirm Delete - Daily Usage</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2>Are you sure you want to delete this usage?</h2>
        <p><strong>Item:</strong> {{ usage.item.chem_id.name }} - {{ usage.item.code }}</p>
        <p><strong>Quantity:</strong> {{ usage.quantity }}</p>
        <p><strong>Date:</strong> {{ usage.date }}</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirm Delete</button>
            <a href="{% url 'dailyusage_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
