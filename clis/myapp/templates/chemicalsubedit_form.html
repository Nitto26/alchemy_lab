<!DOCTYPE html>
{% load static %}
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Chemical Sub</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/app-modern.css' %}">
</head>
<body>
    <div class="container mt-5">
        <h2>Edit Sub Item for {{ chemical.name }}</h2>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="{% url 'chemical_detail' chemical.id %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
