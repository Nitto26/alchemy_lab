<!DOCTYPE html>
<html>
<head>
    <title>Add Sub-Item for {{ item.name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2>Add Sub-Item for {{ item.name }}</h2>
        <form method="post" class="mt-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Save</button>
            <a href="{% url 'item_detail' item.id %}" class="btn btn-secondary ml-2">Cancel</a>
        </form>
        <a href="{% url 'item_detail' item.id %}" class="btn btn-secondary mt-3">Back to Item</a>
    </div>
</body>
</html>
